# nginx site config for startpoint-hub.com
#
# Reverse-proxies all traffic to the Next.js standalone server
# running locally on 127.0.0.1:3100 (managed by pm2).
#
# This file only configures startpoint-hub.com — does not touch any
# other site already on the server.
#
# Deploy:
#   cp deploy/nginx/startpoint-hub.com.conf /etc/nginx/sites-available/
#   ln -sf /etc/nginx/sites-available/startpoint-hub.com.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name startpoint-hub.com www.startpoint-hub.com;

    # Allow large static assets (case study photos, OG images)
    client_max_body_size 25M;

    # Reasonable gzip for HTML/CSS/JS (images are already compressed)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Long cache for hashed Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
